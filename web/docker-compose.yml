# This docker-compose file defines a simple web service using nginx, configured to work with Traefik as a reverse proxy.
# It includes settings for automatic TLS certificate management using Let's Encrypt, and is designed to be easily deployed
# in a Docker environment.
name: ${BASENAME} # This variable should be set in the .env file to ensure unique container names and labels
services:
  web:
    image: nginx:alpine # Using a lightweight nginx image for serving static content
    restart: unless-stopped
    container_name: ${BASENAME}-www
    volumes:
      - ${DATAPATH}:/usr/share/nginx/html:ro
    # This inline command creates a config snippet to enable directory indexing
    command: /bin/sh -c "echo 'server { listen 80; location / { root /usr/share/nginx/html; autoindex on; autoindex_exact_size off; autoindex_localtime on; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      # Secure Router (HTTPS)
      - "traefik.http.routers.${BASENAME}-secure.rule=Host(\"${DOMAIN}\")"
      - "traefik.http.routers.${BASENAME}-secure.entrypoints=websecure"
      - "traefik.http.routers.${BASENAME}-secure.tls=true"
      - "traefik.http.routers.${BASENAME}-secure.tls.certresolver=acmeweb"
      - "traefik.http.routers.${BASENAME}-secure.service=${BASENAME}-svc"

      # HTTP to HTTPS Redirect Router
      - "traefik.http.routers.${BASENAME}-http.rule=Host(\"${DOMAIN}\")"
      - "traefik.http.routers.${BASENAME}-http.entrypoints=web"
      - "traefik.http.routers.${BASENAME}-http.middlewares=${BASENAME}-redirect"
      - "traefik.http.middlewares.${BASENAME}-redirect.redirectscheme.scheme=https"

      # Service Definition
      - "traefik.http.services.${BASENAME}-svc.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy-net"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy-net:
    external: true
